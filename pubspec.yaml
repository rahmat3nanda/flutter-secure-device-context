name: secure_device_context
description: "A new Flutter project."
version: 1.0.0
homepage: https://github.com/rahmat3nanda/flutter-secure-device-context

environment:
  sdk: ^3.8.1
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: id.nesd.secure_device_context_plugin
        pluginClass: SecureDeviceContextPlugin
      ios:
        pluginClass: SecureDeviceContextPlugin